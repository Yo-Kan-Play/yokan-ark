;METADATA=(Diff=true, UseCommands=true)

[ServerSettings]
; 項目: ActiveMods
; 説明: 読み込むMod IDの一覧。カンマ区切りで左側ほど優先度が高い。
; 既定値: N/A
; ActiveMods=123456789,987654321

; 項目: ActiveMapMod
; 説明: 使用するModマップのMod ID。
; 既定値: N/A
; ActiveMapMod=123456789

; 項目: AdminLogging
; 説明: 管理者コマンドをゲーム内チャットへ記録する。
; 既定値: False
AdminLogging=False

; 項目: AllowAnyoneBabyImprintCuddle
; 説明: インプリントした本人以外でも赤ちゃんの世話をできる。
; 既定値: False
AllowAnyoneBabyImprintCuddle=False

; 項目: AllowCaveBuildingPvE
; 説明: PvEで洞窟内建築を許可する。
; 既定値: False
AllowCaveBuildingPvE=False

; 項目: AllowCaveBuildingPvP
; 説明: PvPで洞窟内建築を許可する。Falseで禁止。
; 既定値: True
AllowCaveBuildingPvP=True

; 項目: AllowCryoFridgeOnSaddle
; 説明: プラットフォームサドルやいかだへクライオフリッジを置ける。
; 既定値: False
AllowCryoFridgeOnSaddle=False

; 項目: AllowFlyerCarryPvE
; 説明: PvEで飛行生物が野生生物を掴める。
; 既定値: False
AllowFlyerCarryPvE=False

; 項目: AllowHideDamageSourceFromLogs
; 説明: Falseにすると、トライブログへダメージ元を表示する。
; 既定値: True
AllowHideDamageSourceFromLogs=True

; 項目: AllowHitMarkers
; 説明: Falseにすると、遠距離攻撃のヒットマーカーを無効にする。
; 既定値: True
AllowHitMarkers=True

; 項目: AllowMultipleAttachedC4
; 説明: 1体の生物へ複数C4を付けられる。
; 既定値: False
AllowMultipleAttachedC4=False

; 項目: AllowRaidDinoFeeding
; 説明: ティタノサウルスへ餌やりできるようにして恒久テイムを許可する。
; 既定値: False
AllowRaidDinoFeeding=False

; 項目: AllowThirdPersonPlayer
; 説明: Falseにすると三人称視点を禁止する。
; 既定値: True
AllowThirdPersonPlayer=True

; 項目: AlwaysAllowStructurePickup
; 説明: 建築物のクイック回収制限時間を無効にする。
; 既定値: False
AlwaysAllowStructurePickup=False

; 項目: ArmadoggoDeathCooldown
; 説明: Armadoggoが致死ダメージ後に再出現するまでの秒数。
; 既定値: 3600
ArmadoggoDeathCooldown=3600

; 項目: AutoSavePeriodMinutes
; 説明: 自動セーブ間隔。0はほぼ常時セーブ。
; 既定値: 15.0
AutoSavePeriodMinutes=15.0

; 項目: BanListURL
; 説明: グローバルBANリストのURL。ASA公式URLを使う場合は下の例を使う。
; 既定値: N/A
; BanListURL=https://cdn2.arkdedicated.com/asa/BanList.txt

; 項目: ClampItemSpoilingTimes
; 説明: 異常な腐敗時間を各アイテムの最大値へ丸める。
; 既定値: False
ClampItemSpoilingTimes=False

; 項目: ClampResourceHarvestDamage
; 説明: 採取時の過剰ダメージを資源残HP基準で制限する。
; 既定値: False
ClampResourceHarvestDamage=False

; 項目: CosmeticWhitelistOverride
; 説明: カスタムコスメ許可リストのURL。
; 既定値: N/A
; CosmeticWhitelistOverride=https://example.com/cosmetics.txt

; 項目: CosmoWeaponAmmoReloadAmount
; 説明: Cosmoのウェブスリンガーが自動回復する弾数。
; 既定値: 1
CosmoWeaponAmmoReloadAmount=1

; 項目: CustomLiveTuningUrl
; 説明: ライブチューニング設定JSONのURL。ASA公式URLを使う場合は下の例を使う。
; 既定値: N/A
; CustomLiveTuningUrl=https://cdn2.arkdedicated.com/asa/livetuningoverloads.json

; 項目: DayCycleSpeedScale
; 説明: 昼夜サイクル全体の進行速度。
; 既定値: 1.0
DayCycleSpeedScale=1.0

; 項目: DayTimeSpeedScale
; 説明: 昼の長さ倍率。低いほど昼が長い。
; 既定値: 1.0
DayTimeSpeedScale=1.0

; 項目: DifficultyOffset
; 説明: 難易度倍率。
; 既定値: 1.0
DifficultyOffset=1.0

; 項目: DinoCharacterFoodDrainMultiplier
; 説明: 生物の空腹速度倍率。
; 既定値: 1.0
DinoCharacterFoodDrainMultiplier=1.0

; 項目: DinoCharacterHealthRecoveryMultiplier
; 説明: 生物の自然回復速度倍率。
; 既定値: 1.0
DinoCharacterHealthRecoveryMultiplier=1.0

; 項目: DinoCharacterStaminaDrainMultiplier
; 説明: 生物のスタミナ消費倍率。
; 既定値: 1.0
DinoCharacterStaminaDrainMultiplier=1.0

; 項目: DinoDamageMultiplier
; 説明: 野生生物の与ダメージ倍率。
; 既定値: 1.0
DinoDamageMultiplier=1.0

; 項目: DinoResistanceMultiplier
; 説明: 野生生物の被ダメージ倍率。高いほど受けるダメージが増える。
; 既定値: 1.0
DinoResistanceMultiplier=1.0

; 項目: DestroyTamesOverTheSoftTameLimit
; 説明: ソフト上限を超えたテイムを自動破棄対象にする。
; 既定値: False
DestroyTamesOverTheSoftTameLimit=False

; 項目: DisableCryopodEnemyCheck
; 説明: 敵が近くてもクライオポッドを使える。
; 既定値: False
DisableCryopodEnemyCheck=False

; 項目: DisableCryopodFridgeRequirement
; 説明: 電源付きクライオフリッジ範囲外でもクライオポッドを使える。
; 既定値: False
DisableCryopodFridgeRequirement=False

; 項目: DisableDinoDecayPvE
; 説明: PvEで生物の減衰を無効にする。
; 既定値: False
DisableDinoDecayPvE=False

; 項目: DisableImprintDinoBuff
; 説明: インプリント所有者ボーナスを無効にする。
; 既定値: False
DisableImprintDinoBuff=False

; 項目: DisablePvEGamma
; 説明: PvEで gamma コマンドを禁止する。
; 既定値: False
DisablePvEGamma=False

; 項目: DisableStructureDecayPvE
; 説明: PvEで建築物の自動減衰を無効にする。
; 既定値: False
DisableStructureDecayPvE=False

; 項目: DisableWeatherFog
; 説明: 霧を無効にする。
; 既定値: False
DisableWeatherFog=False

; 項目: DontAlwaysNotifyPlayerJoined
; 説明: プレイヤー参加通知を全体で無効にする。
; 既定値: False
DontAlwaysNotifyPlayerJoined=False

; 項目: EnableExtraStructurePreventionVolumes
; 説明: 特定資源地帯の追加建築禁止ボリュームを有効にする。
; 既定値: False
EnableExtraStructurePreventionVolumes=False

; 項目: EnablePvPGamma
; 説明: PvPで gamma コマンドを許可する。
; 既定値: False
EnablePvPGamma=False

; 項目: ForceAllStructureLocking
; 説明: すべての建築物を初期状態でロックする。
; 既定値: False
ForceAllStructureLocking=False

; 項目: ForceGachaUnhappyInCaves
; 説明: 洞窟内のガチャを不機嫌状態にする。
; 既定値: True
ForceGachaUnhappyInCaves=True

; 項目: globalVoiceChat
; 説明: ボイスチャットをグローバル化する。
; 既定値: False
globalVoiceChat=False

; 項目: HarvestAmountMultiplier
; 説明: 1回あたりの採取量倍率。
; 既定値: 1.0
HarvestAmountMultiplier=1.0

; 項目: HarvestHealthMultiplier
; 説明: 採取対象の耐久倍率。高いほど総採取量が増える。
; 既定値: 1.0
HarvestHealthMultiplier=1.0

; 項目: IgnoreLimitMaxStructuresInRangeTypeFlag
; 説明: 装飾建築の範囲内上限制限を無効にする。
; 既定値: False
IgnoreLimitMaxStructuresInRangeTypeFlag=False

; 項目: ImplantSuicideCD
; 説明: インプラント再スポーン機能の再使用待機秒数。
; 既定値: 28800
ImplantSuicideCD=28800

; 項目: ItemStackSizeMultiplier
; 説明: アイテムスタック上限倍率。
; 既定値: 1.0
ItemStackSizeMultiplier=1.0

; 項目: KickIdlePlayersPeriod
; 説明: 放置プレイヤーをキックするまでの秒数。
; 既定値: 3600.0
KickIdlePlayersPeriod=3600.0

; 項目: MaxCosmoWeaponAmmo
; 説明: Cosmoウェブスリンガー最大弾数。-1でレベル依存。
; 既定値: -1
MaxCosmoWeaponAmmo=-1

; 項目: MaxPersonalTamedDinos
; 説明: トライブごとのテイム上限。0で無効。
; 既定値: 0
MaxPersonalTamedDinos=0

; 項目: MaxTamedDinos
; 説明: サーバー全体のテイム上限。
; 既定値: 5000.0
MaxTamedDinos=5000.0

; 項目: MaxTamedDinos_SoftTameLimit
; 説明: サーバー全体のソフトテイム上限。
; 既定値: 5000
MaxTamedDinos_SoftTameLimit=5000

; 項目: MaxTamedDinos_SoftTameLimit_CountdownForDeletionDuration
; 説明: ソフト上限超過テイムが削除されるまでの秒数。
; 既定値: 604800
MaxTamedDinos_SoftTameLimit_CountdownForDeletionDuration=604800

; 項目: MaxTrainCars
; 説明: train cave の最大車両数。
; 既定値: 8
MaxTrainCars=8

; 項目: MaxTributeDinos
; 説明: ARKデータへアップロードできる生物枠数。
; 既定値: 20
MaxTributeDinos=20

; 項目: MaxTributeItems
; 説明: ARKデータへアップロードできるアイテム枠数。
; 既定値: 50
MaxTributeItems=50

; 項目: NightTimeSpeedScale
; 説明: 夜の長さ倍率。低いほど夜が長い。
; 既定値: 1.0
NightTimeSpeedScale=1.0

; 項目: NonPermanentDiseases
; 説明: 恒久病気を再スポーン時に解除する。
; 既定値: False
NonPermanentDiseases=False

; 項目: OverrideOfficialDifficulty
; 説明: 公式難易度を上書きする。5.0で一般的に野生150上限。
; 既定値: 0.0
OverrideOfficialDifficulty=0.0

; 項目: OverrideStructurePlatformPrevention
; 説明: プラットフォームサドル上の建築制限を緩和する。
; 既定値: False
OverrideStructurePlatformPrevention=False

; 項目: OxygenSwimSpeedStatMultiplier
; 説明: Oxygenへ振った時の泳速上昇倍率。
; 既定値: 1.0
OxygenSwimSpeedStatMultiplier=1.0

; 項目: PerPlatformMaxStructuresMultiplier
; 説明: サドル・いかだ上の建築数上限倍率。
; 既定値: 1.0
PerPlatformMaxStructuresMultiplier=1.0

; 項目: PlatformSaddleBuildAreaBoundsMultiplier
; 説明: サドル建築可能範囲の倍率。
; 既定値: 1.0
PlatformSaddleBuildAreaBoundsMultiplier=1.0

; 項目: PlayerCharacterFoodDrainMultiplier
; 説明: プレイヤーの空腹速度倍率。
; 既定値: 1.0
PlayerCharacterFoodDrainMultiplier=1.0

; 項目: PlayerCharacterHealthRecoveryMultiplier
; 説明: プレイヤーの自然回復速度倍率。
; 既定値: 1.0
PlayerCharacterHealthRecoveryMultiplier=1.0

; 項目: PlayerCharacterStaminaDrainMultiplier
; 説明: プレイヤーのスタミナ消費倍率。
; 既定値: 1.0
PlayerCharacterStaminaDrainMultiplier=1.0

; 項目: PlayerCharacterWaterDrainMultiplier
; 説明: プレイヤーの水分消費倍率。
; 既定値: 1.0
PlayerCharacterWaterDrainMultiplier=1.0

; 項目: PlayerDamageMultiplier
; 説明: プレイヤーの与ダメージ倍率。
; 既定値: 1.0
PlayerDamageMultiplier=1.0

; 項目: PlayerResistanceMultiplier
; 説明: プレイヤーの被ダメージ倍率。高いほど受けるダメージが増える。
; 既定値: 1.0
PlayerResistanceMultiplier=1.0

; 項目: PreventDiseases
; 説明: 病気システム自体を無効にする。
; 既定値: False
PreventDiseases=False

; 項目: PreventMateBoost
; 説明: メイトブーストを無効にする。
; 既定値: False
PreventMateBoost=False

; 項目: PreventOfflinePvP
; 説明: ORPを有効化する。全員ログアウト中のトライブを保護する。
; 既定値: False
PreventOfflinePvP=False

; 項目: PreventOfflinePvPInterval
; 説明: ORPが有効になるまでの待機秒数。
; 既定値: 0.0
PreventOfflinePvPInterval=0.0

; 項目: PreventSpawnAnimations
; 説明: リスポーン時の起床アニメーションを省略する。
; 既定値: False
PreventSpawnAnimations=False

; 項目: PreventTribeAlliances
; 説明: トライブ同盟を禁止する。
; 既定値: False
PreventTribeAlliances=False

; 項目: ProximityChat
; 説明: 近距離チャットのみにする。
; 既定値: False
ProximityChat=False

; 項目: PvEAllowStructuresAtSupplyDrops
; 説明: PvEで補給物資付近の建築を許可する。
; 既定値: False
PvEAllowStructuresAtSupplyDrops=False

; 項目: PvEDinoDecayPeriodMultiplier
; 説明: PvE生物減衰時間の倍率。
; 既定値: 1.0
PvEDinoDecayPeriodMultiplier=1.0

; 項目: PvPDinoDecay
; 説明: PvPでORP有効中も生物減衰を有効にする。
; 既定値: False
PvPDinoDecay=False

; 項目: RaidDinoCharacterFoodDrainMultiplier
; 説明: レイド生物の空腹速度倍率。
; 既定値: 1.0
RaidDinoCharacterFoodDrainMultiplier=1.0

; 項目: RandomSupplyCratePoints
; 説明: 補給物資の出現位置をランダム化する。
; 既定値: False
RandomSupplyCratePoints=False

; 項目: RCONPort
; 説明: RCON用TCPポート。
; 既定値: 27020
RCONPort=27020

; 項目: RCONServerGameLogBuffer
; 説明: RCONへ流すゲームログ行数。
; 既定値: 600.0
RCONServerGameLogBuffer=600.0

; 項目: ResourcesRespawnPeriodMultiplier
; 説明: 資源の再湧き時間倍率。低いほど早い。
; 既定値: 1.0
ResourcesRespawnPeriodMultiplier=1.0

; 項目: ServerAdminPassword
; 説明: 管理者権限取得用パスワード。
; 既定値: N/A
; ServerAdminPassword=<ADMIN_PASSWORD>

; 項目: ServerCrosshair
; 説明: Falseでクロスヘアを無効にする。
; 既定値: True
ServerCrosshair=True

; 項目: ServerForceNoHUD
; 説明: 非トライブ所有NPCでHUDを強制非表示にする。
; 既定値: False
ServerForceNoHUD=False

; 項目: ServerHardcore
; 説明: 死亡時にレベル1へ戻るハードコアモード。
; 既定値: False
ServerHardcore=False

; 項目: ServerPassword
; 説明: サーバー参加パスワード。
; 既定値: N/A
; ServerPassword=<SERVER_PASSWORD>

; 項目: serverPVE
; 説明: TrueでPvEを有効化し、PvPを無効化する。
; 既定値: False
serverPVE=False

; 項目: ShowFloatingDamageText
; 説明: RPG風ダメージ数値表示を有効にする。
; 既定値: False
ShowFloatingDamageText=False

; 項目: ShowMapPlayerLocation
; 説明: Falseで地図上の自分の正確な位置を隠す。
; 既定値: True
ShowMapPlayerLocation=True

; 項目: StructurePickupHoldDuration
; 説明: 建築物回収に必要な長押し時間。
; 既定値: 0.5
StructurePickupHoldDuration=0.5

; 項目: StructurePickupTimeAfterPlacement
; 説明: 建築後に回収可能な時間。
; 既定値: 30.0
StructurePickupTimeAfterPlacement=30.0

; 項目: StructurePreventResourceRadiusMultiplier
; 説明: 建築による資源再湧き阻害半径の倍率。
; 既定値: 1.0
StructurePreventResourceRadiusMultiplier=1.0

; 項目: StructureResistanceMultiplier
; 説明: 建築物の被ダメージ倍率。高いほど受けるダメージが増える。
; 既定値: 1.0
StructureResistanceMultiplier=1.0

; 項目: TamingSpeedMultiplier
; 説明: テイム速度倍率。
; 既定値: 1.0
TamingSpeedMultiplier=1.0

; 項目: TheMaxStructuresInRange
; 説明: 一定範囲内へ建築できる最大数。
; 既定値: 10500
TheMaxStructuresInRange=10500

; 項目: TribeNameChangeCooldown
; 説明: トライブ名変更のクールダウン。単位は分。
; 既定値: 15.0
TribeNameChangeCooldown=15.0

; 項目: XPMultiplier
; 説明: 経験値倍率。
; 既定値: 1.0
XPMultiplier=1.0

; 項目: YoungIceFoxDeathCooldown
; 説明: Veilwynが致死ダメージ後に再出現するまでの秒数。
; 既定値: 3600
YoungIceFoxDeathCooldown=3600

; 項目: CrossARKAllowForeignDinoDownloads
; 説明: Aberrationで非固有生物のダウンロードを許可する。
; 既定値: False
CrossARKAllowForeignDinoDownloads=False

; 項目: noTributeDownloads
; 説明: Cross-ARKデータ全般のダウンロードを禁止する。
; 既定値: False
noTributeDownloads=False

; 項目: PreventDownloadDinos
; 説明: ARKデータから生物をダウンロードできなくする。
; 既定値: False
PreventDownloadDinos=False

; 項目: PreventDownloadItems
; 説明: ARKデータからアイテムをダウンロードできなくする。
; 既定値: False
PreventDownloadItems=False

; 項目: PreventDownloadSurvivors
; 説明: ARKデータからサバイバーをダウンロードできなくする。
; 既定値: False
PreventDownloadSurvivors=False

; 項目: PreventUploadDinos
; 説明: 生物をARKデータへアップロードできなくする。
; 既定値: False
PreventUploadDinos=False

; 項目: PreventUploadItems
; 説明: アイテムをARKデータへアップロードできなくする。
; 既定値: False
PreventUploadItems=False

; 項目: PreventUploadSurvivors
; 説明: サバイバーをARKデータへアップロードできなくする。
; 既定値: False
PreventUploadSurvivors=False

; 項目: BadWordListURL
; 説明: NGワードリストのURL。ASA公式URLを例として入れている。
; 既定値: ASA公式URL
; BadWordListURL=http://cdn2.arkdedicated.com/asa/badwords.txt

; 項目: BadWordWhiteListURL
; 説明: 許可ワードリストのURL。ASA公式URLを例として入れている。
; 既定値: ASA公式URL
; BadWordWhiteListURL=http://cdn2.arkdedicated.com/asa/goodwords.txt

; 項目: LimitBunkersPerTribe
; 説明: トライブごとのバンカー数制限を有効にする。
; 既定値: True
LimitBunkersPerTribe=True

; 項目: LimitBunkersPerTribeNum
; 説明: トライブごとのバンカー上限数。
; 既定値: 3
LimitBunkersPerTribeNum=3

; 項目: AllowBunkersInPreventionZones
; 説明: 建築禁止エリアでバンカー設置を許可する。
; 既定値: False
AllowBunkersInPreventionZones=False

; 項目: AllowRidingDinosInsideBunkers
; 説明: バンカー内部で恐竜へ騎乗できる。
; 既定値: True
AllowRidingDinosInsideBunkers=True

; 項目: AllowBunkerModulesAboveGround
; 説明: バンカーモジュールを地上へ設置できる。
; 既定値: False
AllowBunkerModulesAboveGround=False

; 項目: AllowDinoAIInsideBunkers
; 説明: バンカー内部で恐竜AIを有効にする。
; 既定値: True
AllowDinoAIInsideBunkers=True

; 項目: AllowBunkerModulesInPreventionZones
; 説明: 建築禁止エリアでバンカーモジュールを置ける。
; 既定値: False
AllowBunkerModulesInPreventionZones=False

; 項目: MinDistanceBetweenBunkers
; 説明: バンカー同士の最小距離。
; 既定値: 3000.0
MinDistanceBetweenBunkers=3000.0

; 項目: EnemyAccessBunkerHPThreshold
; 説明: バンカーHPがこの割合以下になると敵アクセスを許可する閾値。
; 既定値: 0.25
EnemyAccessBunkerHPThreshold=0.25

; 項目: BunkerUnderHPThresholdDmgMultiplier
; 説明: 閾値以下のバンカーへ適用するダメージ倍率。
; 既定値: 0.05
BunkerUnderHPThresholdDmgMultiplier=0.05

; 項目: CryoHospitalHoursToRegenHP
; 説明: クライオ病院でHP回復にかかる時間。単位は時間。
; 既定値: 1.0
CryoHospitalHoursToRegenHP=1.0

; 項目: CryoHospitalHoursToRegenFood
; 説明: クライオ病院で食料回復にかかる時間。単位は時間。
; 既定値: 24.0
CryoHospitalHoursToRegenFood=24.0

; 項目: CryoHospitalHoursToDrainTorpor
; 説明: クライオ病院で昏睡値回復にかかる時間。単位は時間。
; 既定値: 1.0
CryoHospitalHoursToDrainTorpor=1.0

; 項目: CryoHospitalMatingCooldownReduction
; 説明: クライオ病院での交配クールダウン短縮倍率。
; 既定値: 2.0
CryoHospitalMatingCooldownReduction=2.0

; 項目: BloodforgeReinforceExtraDurability
; 説明: Bloodforge強化で追加される耐久倍率。
; 既定値: 0.3
BloodforgeReinforceExtraDurability=0.3

; 項目: BloodforgeReinforceResourceCostMultiplier
; 説明: Bloodforge強化に必要な資源コスト倍率。
; 既定値: 3.0
BloodforgeReinforceResourceCostMultiplier=3.0

; 項目: BloodforgeReinforceSpeedMultiplier
; 説明: Bloodforge強化速度倍率。
; 既定値: 0.1
BloodforgeReinforceSpeedMultiplier=0.1

; 項目: MaxActiveOutposts
; 説明: 同時に有効なOutpost数の上限。
; 既定値: N/A
; MaxActiveOutposts=10

; 項目: MaxActiveResourceCaches
; 説明: 同時に有効なResource Cache数の上限。
; 既定値: N/A
; MaxActiveResourceCaches=10

; 項目: MaxActiveCityOutposts
; 説明: 同時に有効なCity Outpost数の上限。
; 既定値: N/A
; MaxActiveCityOutposts=10

; 項目: AdminListURL
; 説明: 管理者ホワイトリストを配布するURL。
; 既定値: N/A
; AdminListURL=https://example.com/admins.txt

; 項目: AutoRestartIntervalSeconds
; 説明: サーバー自動再起動までの秒数。挙動が不安定という注記あり。
; 既定値: Unknown
; AutoRestartIntervalSeconds=86400

; 項目: UpdateAllowedCheatersInterval
; 説明: AllowedCheatersの更新確認間隔。単位は秒。
; 既定値: 600.0
UpdateAllowedCheatersInterval=600.0

; 項目: UseCharacterTracker
; 説明: キャラクター追跡機能を有効にする。
; 既定値: False
UseCharacterTracker=False

; 項目: StartTimeHour
; 説明: サンプルINIに含まれていた項目。ゲーム内時間の開始時刻に関わる設定として使われることがある。
; 既定値: 不明 / サンプル由来
StartTimeHour=-1

; 項目: OverrideSecondsUntilBuriedTreasureAutoReveals
; 説明: サンプルINIに含まれていた項目。埋蔵宝の自動表示までの秒数を上書きする設定として使われることがある。
; 既定値: 不明 / サンプル由来
OverrideSecondsUntilBuriedTreasureAutoReveals=1209600

; 項目: RCONEnabled
; 説明: サンプルINIに含まれていた項目。RCON機能の有効化フラグ。
; 既定値: 不明 / サンプル由来
RCONEnabled=True


[SessionSettings]
; 項目: Port
; 説明: ゲーム用UDPポート。
; 既定値: 7777
Port=7777

; 項目: SessionName
; 説明: サーバーブラウザへ表示するサーバー名。
; 既定値: ARK #123456
SessionName=My ASA Server


[/Script/Engine.GameSession]
; 項目: MaxPlayers
; 説明: サンプルINIに含まれていた項目。最大参加人数。
; 既定値: 10 / サンプル由来
MaxPlayers=10
