;METADATA=(Diff=true, UseCommands=true)

[/Script/ShooterGame.ShooterGameMode]
; 項目: BabyCuddleGracePeriodMultiplier
; 説明: 赤ちゃんの世話が遅れた後、インプリント品質が下がり始めるまでの猶予時間倍率。
; 既定値: 1.0
BabyCuddleGracePeriodMultiplier=1.0

; 項目: BabyCuddleIntervalMultiplier
; 説明: インプリント用の世話要求間隔倍率。高いほど、より頻繁に世話が必要になる。
; 既定値: 1.0
BabyCuddleIntervalMultiplier=1.0

; 項目: BabyCuddleLoseImprintQualitySpeedMultiplier
; 説明: 猶予時間経過後に、インプリント品質が低下する速度倍率。
; 既定値: 1.0
BabyCuddleLoseImprintQualitySpeedMultiplier=1.0

; 項目: BabyFoodConsumptionSpeedMultiplier
; 説明: 赤ちゃんテイムの食料消費速度倍率。低いほど食料消費が減る。
; 既定値: 1.0
BabyFoodConsumptionSpeedMultiplier=1.0

; 項目: BabyImprintAmountMultiplier
; 説明: 1回の世話で増えるインプリント％の倍率。
; 既定値: 1.0
BabyImprintAmountMultiplier=1.0

; 項目: BabyImprintingStatScaleMultiplier
; 説明: インプリント品質が能力へ与える影響倍率。0で実質無効。
; 既定値: 1.0
BabyImprintingStatScaleMultiplier=1.0

; 項目: BabyMatureSpeedMultiplier
; 説明: 赤ちゃんの成長速度倍率。高いほど成熟が早い。
; 既定値: 1.0
BabyMatureSpeedMultiplier=1.0

; 項目: bAllowFlyerSpeedLeveling
; 説明: 飛行生物の移動速度へレベル振りできるようにする。ASAでは bAllowSpeedLeveling=True も必要。
; 既定値: False
bAllowFlyerSpeedLeveling=False

; 項目: bAllowSpeedLeveling
; 説明: プレイヤーと非飛行生物の移動速度へレベル振りできるようにする。
; 既定値: False
bAllowSpeedLeveling=False

; 項目: bAllowUnlimitedRespecs
; 説明: Mindwipe Tonic を24時間待機なしで何度でも使えるようにする。
; 既定値: False
bAllowUnlimitedRespecs=False

; 項目: bDisableFriendlyFire
; 説明: トライブ仲間・テイム・建築物へのフレンドリーファイアを無効化する。
; 既定値: False
bDisableFriendlyFire=False

; 項目: bDisablePhotoMode
; 説明: Trueでフォトモードを禁止する。
; 既定値: False
bDisablePhotoMode=False

; 項目: bDisableStructurePlacementCollision
; 説明: 建築物を地形へめり込ませて設置できるようにする。
; 既定値: False
bDisableStructurePlacementCollision=False

; 項目: bIgnoreStructuresPreventionVolumes
; 説明: 本来建築禁止の領域でも建築を許可する。
; 既定値: False
bIgnoreStructuresPreventionVolumes=False

; 項目: bPvEDisableFriendlyFire
; 説明: PvEサーバーでフレンドリーファイアを無効化する。
; 既定値: False
bPvEDisableFriendlyFire=False

; 項目: bShowCreativeMode
; 説明: ポーズメニューへクリエイティブモード切替ボタンを追加する。
; 既定値: False
bShowCreativeMode=False

; 項目: bUseDinoLevelUpAnimations
; 説明: Falseでテイム生物のレベルアップ演出を省略する。
; 既定値: True
bUseDinoLevelUpAnimations=True

; 項目: bUseSingleplayerSettings
; 説明: 少人数・ソロ向けバランス設定をまとめて適用する。
; 既定値: False
bUseSingleplayerSettings=False

; 項目: CheatTeleportLocations
; 説明: TP コマンド用の名前付きテレポート地点を定義する。座標はGPSではなくUnreal座標。
; 既定値: N/A
; CheatTeleportLocations=(TeleportName="Hightower",TeleportLocation=(X=467967.0,Y=-359082.0,Z=6879.0))

; 項目: ConfigAddNPCSpawnEntriesContainer
; 説明: 特定スポーン領域へ生物出現設定を追加する。
; 既定値: N/A
; ConfigAddNPCSpawnEntriesContainer=(NPCSpawnEntriesContainerClassString="DinoSpawnEntriesBeach_C",NPCSpawnEntries=((AnEntryName="MySpawn",EntryWeight=0.1,NPCsToSpawnStrings=("Raptor_Character_BP_C"))),NPCSpawnLimits=((NPCClassString="Raptor_Character_BP_C",MaxPercentageOfDesiredNumToAllow=0.1)))

; 項目: CraftingSkillBonusMultiplier
; 説明: Crafting Skill によるボーナス倍率。
; 既定値: 1.0
CraftingSkillBonusMultiplier=1.0

; 項目: CraftXPMultiplier
; 説明: クラフトで得る経験値倍率。
; 既定値: 1.0
CraftXPMultiplier=1.0

; 項目: CropDecaySpeedMultiplier
; 説明: プランター内作物の劣化速度倍率。高いほど劣化が遅くなる説明になっている。
; 既定値: 1.0
CropDecaySpeedMultiplier=1.0

; 項目: CropGrowthSpeedMultiplier
; 説明: プランター内作物の成長速度倍率。
; 既定値: 1.0
CropGrowthSpeedMultiplier=1.0

; 項目: CustomRecipeEffectivenessMultiplier
; 説明: カスタムレシピ効果量の倍率。
; 既定値: 1.0
CustomRecipeEffectivenessMultiplier=1.0

; 項目: CustomRecipeSkillMultiplier
; 説明: カスタムレシピ計算へ使うクラフト速度の影響倍率。
; 既定値: 1.0
CustomRecipeSkillMultiplier=1.0

; 項目: DestroyTamesOverLevelClamp
; 説明: このレベルを超えたテイムをサーバー起動時に削除する。0は無効扱いのことが多い。
; 既定値: 0
DestroyTamesOverLevelClamp=0

; 項目: EggHatchSpeedMultiplier
; 説明: 受精卵の孵化速度倍率。高いほど早く孵化する。
; 既定値: 1.0
EggHatchSpeedMultiplier=1.0

; 項目: ExcludeItemIndices
; 説明: 補給物資テーブルから除外するアイテムID。複数行指定可。
; 既定値: N/A
; ExcludeItemIndices=123

; 項目: LimitGeneratorsNum
; 説明: LimitGeneratorsRange の範囲内へ置ける発電機数上限。
; 既定値: 3
LimitGeneratorsNum=3

; 項目: LimitGeneratorsRange
; 説明: LimitGeneratorsNum が適用される範囲。単位はUnreal Units。
; 既定値: 15000
LimitGeneratorsRange=15000

; 項目: GenericXPMultiplier
; 説明: 時間経過などの汎用経験値倍率。
; 既定値: 1.0
GenericXPMultiplier=1.0

; 項目: GlobalItemDecompositionTimeMultiplier
; 説明: ドロップ品・デスバッグなどの消滅までの時間倍率。高いほど長持ちする。
; 既定値: 1.0
GlobalItemDecompositionTimeMultiplier=1.0

; 項目: GlobalSpoilingTimeMultiplier
; 説明: 食品など腐敗するアイテムの腐敗時間倍率。高いほど長持ちする。
; 既定値: 1.0
GlobalSpoilingTimeMultiplier=1.0

; 項目: HairGrowthSpeedMultiplier
; 説明: 髪の成長速度倍率。ASA既定値は0表記。
; 既定値: 1.0 (ASE), 0 (ASA)
HairGrowthSpeedMultiplier=0

; 項目: HarvestResourceItemAmountClassMultipliers
; 説明: 資源タイプごとの採取量倍率を個別設定する。
; 既定値: N/A
; HarvestResourceItemAmountClassMultipliers=(ClassName="PrimalItemResource_Stone_C",Multiplier=1.0)

; 項目: HarvestXPMultiplier
; 説明: 採取で得る経験値倍率。
; 既定値: 1.0
HarvestXPMultiplier=1.0

; 項目: IgnorePVPMountedWeaponryRestrictions
; 説明: PvPの騎乗武装制限に関する設定。説明不足で詳細不明。
; 既定値: False
IgnorePVPMountedWeaponryRestrictions=False

; 項目: KillXPMultiplier
; 説明: キルで得る経験値倍率。
; 既定値: 1.0
KillXPMultiplier=1.0

; 項目: LayEggIntervalMultiplier
; 説明: 産卵間隔倍率。高いほど次の産卵まで長くなる。
; 既定値: 1.0
LayEggIntervalMultiplier=1.0

; 項目: MatingIntervalMultiplier
; 説明: 交配クールダウン倍率。低いほど再交配が早い。
; 既定値: 1.0
MatingIntervalMultiplier=1.0

; 項目: MatingSpeedMultiplier
; 説明: 交配進行速度倍率。高いほど交配完了が早い。
; 既定値: 1.0
MatingSpeedMultiplier=1.0

; 項目: MaxFallSpeedMultiplier
; 説明: 落下ダメージが発生し始める落下許容量の倍率。高いほど高所落下に強くなる。
; 既定値: 1.0
MaxFallSpeedMultiplier=1.0

; 項目: OverrideNamedEngramEntries
; 説明: 名前指定でエングラムの解放条件や状態を上書きする。
; 既定値: N/A
; OverrideNamedEngramEntries=(EngramClassName="EngramEntry_Campfire_C",EngramHidden=False,EngramPointsCost=3,EngramLevelRequirement=1,RemoveEngramPreReq=False)

; 項目: PerLevelStatsMultiplier_Player[7]
; 説明: プレイヤーステータスごとのレベルアップ倍率。ここでは例として Weight を想定した添字 7 を使う。
; 既定値: N/A
; PerLevelStatsMultiplier_Player[7]=1.0

; 項目: PhotoModeRangeLimit
; 説明: フォトモードでカメラをプレイヤーから離せる最大距離。
; 既定値: 3000
PhotoModeRangeLimit=3000

; 項目: PoopIntervalMultiplier
; 説明: プレイヤーが排泄する頻度倍率。高いほど頻度が下がる。
; 既定値: 1.0
PoopIntervalMultiplier=1.0

; 項目: ResourceNoReplenishRadiusPlayers
; 説明: プレイヤー周辺で資源が再湧きしない半径倍率。高いほど再湧きしにくい。
; 既定値: 1.0
ResourceNoReplenishRadiusPlayers=1.0

; 項目: ResourceNoReplenishRadiusStructures
; 説明: 建築物周辺で資源が再湧きしない半径倍率。高いほど再湧きしにくい。
; 既定値: 1.0
ResourceNoReplenishRadiusStructures=1.0

; 項目: SpecialXPMultiplier
; 説明: SpecialEventで得る経験値倍率。
; 既定値: 1.0
SpecialXPMultiplier=1.0

; 項目: TribeTowerBonusMultiplier
; 説明: Tribe Tower ボーナス倍率。
; 既定値: 2.0
TribeTowerBonusMultiplier=2.0

; 項目: ValgueroMemorialEntries
; 説明: Valguero Memorial に表示するプレイヤー名一覧。セミコロン区切り。
; 既定値: N/A
; ValgueroMemorialEntries=Alice;Bob

; 項目: BaseHexagonRewardMultiplier
; 説明: ミッション報酬ヘキサゴン量倍率。ASAでは Club Ark のトークン報酬にも影響。
; 既定値: 1.0
BaseHexagonRewardMultiplier=1.0

; 項目: HexagonCostMultiplier
; 説明: ヘキサゴンショップの価格倍率。ASAでは Club Ark のトークン価格にも影響。
; 既定値: 1.0
HexagonCostMultiplier=1.0


[ModInstaller]
; 項目: BabyCuddleIntervalMultiplier
; 説明: Game.ini 側の同名設定と同じ。インプリント世話要求間隔倍率。
; 既定値: 1.0
BabyCuddleIntervalMultiplier=1.0

; 項目: BabyImprintAmountMultiplier
; 説明: Game.ini 側の同名設定と同じ。1回の世話で増えるインプリント量倍率。
; 既定値: 1.0
BabyImprintAmountMultiplier=1.0

; 項目: BabyMatureSpeedMultiplier
; 説明: Game.ini 側の同名設定と同じ。成長速度倍率。
; 既定値: 1.0
BabyMatureSpeedMultiplier=1.0

; 項目: DynamicColorset
; 説明: 色名をカンマ区切りで指定する動的カラーパターン。ActiveEventColors=custom のときのみ使用。
; 既定値: N/A
; DynamicColorset=Red,Blue,Green

; 項目: DynamicColorsetChanceOverride
; 説明: DynamicColorset が適用される確率。0.0〜1.0。未設定時は0.25。
; 既定値: N/A
; DynamicColorsetChanceOverride=0.25

; 項目: EggHatchSpeedMultiplier
; 説明: Game.ini 側の同名設定と同じ。孵化速度倍率。
; 既定値: 1.0
EggHatchSpeedMultiplier=1.0

; 項目: HarvestAmountMultiplier
; 説明: GameUserSettings.ini 側の同名設定と同じ。採取量倍率。
; 既定値: 1.0
HarvestAmountMultiplier=1.0

; 項目: HexagonRewardMultiplier
; 説明: Game.ini 側の同系設定。ヘキサゴン報酬倍率。
; 既定値: 1.0
HexagonRewardMultiplier=1.0

; 項目: MatingIntervalMultiplier
; 説明: Game.ini 側の同名設定と同じ。交配間隔倍率。
; 既定値: 1.0
MatingIntervalMultiplier=1.0

; 項目: XPMultiplier
; 説明: Game.ini 側の同名設定と同じ。経験値倍率。
; 既定値: 1.0
XPMultiplier=1.0


