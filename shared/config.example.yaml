# yokan-ark Discord Bot 設定例
# - このファイルを ./bot/config.yaml にコピーしてください
# - シークレット（R2キー、Discordトークン、RCONパスワード）は環境変数に入れ、git に含めないでください。

# --- Discord ---
discord:
  # スラッシュコマンドは以下のチャンネルのみ受け付けます。
  command_channel_ids:
    - 123456789012345678

  # ボットはこのチャンネルに通知（起動/停止/バックアップ/エラー）を送信します。
  notify_channel_id: 234567890123456789

  # 任意（開発用）：スラッシュコマンドを特定のギルドに登録すると変更が早く反映されます。
  # 空の場合はグローバル登録になります。
  command_guild_id: ""

# --- Permissions ---
permissions:
  # フォールバックのロールルール（コマンドごとのルールが未定義の場合に使用）
  default:
    allow_role_ids:
      - 111111111111111111

  # コマンドごとのルール
  # - allow_user_ids に1つ以上のエントリがある場合：そのユーザーのみ実行可能
  # - allow_user_ids が空配列の場合：誰でも実行可能
  commands:
    start:
      allow_user_ids: [123456789012345678]
    stop:
      allow_user_ids: [123456789012345678]
    save:
      allow_user_ids: [123456789012345678]
    backup:
      allow_user_ids: [123456789012345678]
    scan:
      allow_user_ids: [123456789012345678]
    config-reload:
      allow_user_ids: [123456789012345678]
    status:
      allow_user_ids: []
    players:
      allow_user_ids: []
    maps:
      allow_user_ids: []

# --- ランタイム設定 ---
runtime:
  max_running_maps: 2
  scan_interval_minutes: 15
  idle_stop_minutes: 30
  save_wait_seconds: 10
  rcon_timeout_seconds: 5
  podman_timeout_seconds: 20
  presence_interval_seconds: 120
  shutdown_timeout_seconds: 90

# --- Podman 制御 ---
podman:
  # ボットコンテナ内の rootless podman ソケットパス。
  # ボットコンテナはこのソケットをマウントする必要があります。
  socket_path: /run/user/1000/podman/podman.sock

  # このリポジトリからビルドされるサーバーイメージ。
  server_image: yokan-ark-maps:latest

  # 永続データ用のホスト側パス（単一マウント）。ボットはこのパスを使ってディレクトリを作成します。
  persist_host_path: /srv/yokan-ark/persist

  # マップコンテナに読み取り専用でマウントされる共通 INI ディレクトリのホスト側パス。
  # 空の場合、bot は dirname(persist_host_path)/shared/ini/WindowsServer を使用して推測します。
  shared_ini_host_path: /srv/yokan-ark/shared/ini/WindowsServer

  # ボットコンテナ内から見える永続パス。
  # ホストの persist をコンテナ内の別パス（例：/persist）にマウントしている場合はここを設定してください。
  persist_container_path: /srv/yokan-ark/persist

  container_name_prefix: yokan-ark-

  create_defaults:
    timezone_mount: true
    publish_query_port: true

# --- サーバーのデフォルト（全マップ共通） ---
server_defaults:
  cluster_id: yokan-ark
  max_players: 10
  memory_limit_gb: 20
  rcon_password_env: ARK_RCON_PASSWORD
  rcon_host: host.containers.internal
  rcon_port_offset: 19243
  query_port_offset: 1

  # 任意：ASA_START_PARAMS に追加で付与されるパラメータ
  # extra_asa_start_params: "-WinLiveMaxPlayers=10"

# --- バックアップ設定 ---
backup:
  local:
    enabled: true
    interval_minutes: 120
    keep_generations: 3
    run_on_stop: true
    out_dir: /srv/yokan-ark/backups/local

  cloud:
    enabled: true
    provider: cloudflare_r2
    schedule_hhmm: "01:00"
    keep_days: 2
    bucket: yokan-ark-backups
    prefix: yokan-ark

announcements:
  enabled: true
  items:
    - name: daily_notice_1
      time: "01:50"
      weekdays: ["mon", "tue", "wed", "thu", "fri", "sat", "sun"]
      message: "定期アナウンスです。必要に応じてセーブ・ログアウトをお願いします。"
      include_maps: []
    - name: daily_notice_2
      time: "01:59"
      message: "定期アナウンスです。"
      include_maps: []

    # R2 の設定は通常ボットコンテナの環境変数から読み取られます：
    # - R2_ENDPOINT
    # - R2_ACCESS_KEY_ID
    # - R2_SECRET_ACCESS_KEY
    # - R2_BUCKET

# --- マップ一覧 ---
# マップごとに設定すべき値は map_id / session_name / port のみです。
#
# ポート方針：
# - 複数マップを同時に動かす際の衝突リスクを下げるため、10刻みのゲームポートを使います：
#   7777 -> 7787 -> 7797 ...
#
# 派生ポート（マップ側で設定不要）：
# - RCON ポート: port + 19243  (7777 -> 27020)
# - Query ポート: port + 1     （任意）

maps:
  - map_id: TheCenter_WP
    display_name: The Center
    session_name: Yokan Ark The Center
    port: 7777
    # memory_limit_gb: 24
    backup_enabled: true
    publish_query_port: true

  - map_id: ScorchedEarth_WP
    display_name: Scorched Earth
    session_name: Yokan Ark Scorched Earth
    port: 7787
    backup_enabled: true
    publish_query_port: true

  - map_id: Aberration_WP
    display_name: Aberration
    session_name: Yokan Ark Aberration
    port: 7797
    backup_enabled: true
    publish_query_port: false
